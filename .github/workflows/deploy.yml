name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Дозволи для публікації на Pages через OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Один активний деплой за раз; нові пуші не скасовують уже запущений реліз.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
